global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "finserve-web"
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:8188"]
        labels:
          service: "finserve-proxy"

  - job_name: "vllm-engine"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "vllm"
